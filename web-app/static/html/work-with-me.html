<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Guseyn">
    <meta name="description" content="Work with Guseyn Ismayylov — solo full-stack developer, boring software for longevity, remote from Georgia.">
    <title>Work with me — Guseyn Ismayylov</title>
    <link rel="shortcut icon" type="image/png" href="/image/favicon.png?v=f80d70da">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,400i,700,700i">
    <link rel="stylesheet" href="/css/normalize.css?v=54740e0a">
    <link rel="stylesheet" href="/css/e-ui.css?v=701213stamp">
    <style>
      :root {
        --e-primary: #701213;
        --e-primary-color: var(--e-primary);
        --e-primary-fg: #ffffff;
      }
      .progress-opacity {
        opacity: 0.35;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      *[data-animate="pulse"], [is^="e-"][data-animate="pulse"] {
        animation: e-pulse 2s ease-in-out infinite;
      }

      @keyframes e-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.45; }
      }

      @media (prefers-reduced-motion: reduce) {
        *[data-animate="pulse"], [is^="e-"][data-animate="pulse"] {
          animation: none;
        }
      }

      *[data-overflow="hidden"], [is^="e-"][data-overflow="hidden"] {
        overflow: hidden;
      }

      svg[data-georgia-map] {
        display: block;
        width: 3rem;
        height: 1.7rem;
        flex-shrink: 0;
        color: var(--e-primary-color, var(--e-primary));
      }

      span[is="e-badge"][data-variant="dot"] {
        width: 0.5rem;
        height: 0.5rem;
        min-width: 0.5rem;
        padding: 0;
      }

      span[is="e-badge"][data-variant="dot"][data-background="success"] {
        background-color: var(--e-success);
      }

      svg[data-height="sm"] {
        height: var(--e-img-sm);
        width: auto;
        flex-shrink: 0;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "#ehtml/": "/js/ehtml/",
          "#ehtml/main": "/js/ehtml/main.js?v=1a6f54c9"
        }
      }
    </script>
    <script type="module">import '#ehtml/main'</script>
  </head>
  <body data-background="surface">
    <main is="e-main" data-landing data-centralized data-padding-top="lg" data-padding-bottom="3xl">
      <e-html
        data-src="/html/content/work-with-me.html?v=w24stamp2026"
        data-actions-on-progress-start="
          document.body.classList.toggle('progress-opacity')
        "
        data-actions-on-progress-end="
          document.body.classList.toggle('progress-opacity')
        "
      ></e-html>
    </main>
  </body>
</html>
